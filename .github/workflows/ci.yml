name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mj
    steps:
      - uses: actions/checkout@v6

      - name: Format check
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy

      - name: Test
        run: cargo test
